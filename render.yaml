services:
  - type: web
    name: fake-news-detection
    runtime: python
    plan: free
    rootDir: fakenewsproject
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.5
